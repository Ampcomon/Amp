<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amphile|以同频致超幅</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            color: #ffffff;
            overflow-x: hidden; /* 防止横向滚动条 */
        }

        /* 英雄视差背景区域 - 优化适配逻辑 */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden; /* 核心：裁剪溢出部分 */
        }

        /* 核心适配图片样式 */
        .hero-background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 核心：保持比例填充 */
            
            /* 电脑端默认定位：居中对齐，左侧显示科技网格，右侧显示流体 */
            object-position: center center; 
            z-index: 0;
        }

        /* 暗色遮罩层：确保文字清晰 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 使用渐变遮罩，左侧偏深，右侧渐浅 */
            background: linear-gradient(90deg, rgba(10, 20, 40, 0.9) 0%, rgba(10, 20, 40, 0.5) 100%);
            z-index: 1;
        }

        /* 顶部导航栏 */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 左上角 Logo */
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            /* 移除了 text-transform 属性，保持首字母大写 Amphile */
        }

        /* 导航菜单整体样式 */
        .nav-menu ul {
            display: flex;
            list-style: none; /* 去除列表默认的圆点 */
            gap: 40px; /* 菜单项之间的间距 */
        }

        /* 导航链接文本样式 */
        .nav-menu a {
            color: #ffffff;
            text-decoration: none; /* 去除下划线 */
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease; /* 添加颜色渐变的动画效果 */
        }

        /* 鼠标悬停时的效果（使用不饱和的古铜金） */
        .nav-menu a:hover {
            color: #d1b99a; 
        }

        /* 主体内容区 */
        .content {
            position: relative;
            z-index: 2;
            padding: 0 10%;
            max-width: 1200px;
        }

        .slogan {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 20px;
            background: linear-gradient(120deg, #ffffff, #d1b99a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .description {
            font-size: 20px;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 40px;
            color: #e0e0e0;
            max-width: 600px;
            letter-spacing: 1px;
        }

        /* 分界线装饰 */
        .divider {
            width: 60px;
            height: 4px;
            background-color: #d1b99a;
            margin-bottom: 30px;
            border-radius: 2px;
        }

        /* 响应式设计：适配手机端 */
        @media (max-width: 768px) {
            header {
                padding: 20px;
            }
            .logo {
                font-size: 24px;
            }
            .slogan {
                font-size: 40px;
                letter-spacing: 2px;
            }
            .description {
                font-size: 16px;
                max-width: 90%;
            }
            .content {
                padding: 0 5%;
            }

            /* 核心技术适配：手机竖屏 (Portrait) */
            .hero-background-img {
                /* 在手机端，将裁剪区域水平向右移动到图像的 70% 处，让核心故事居中显示。 */
                object-position: 70% center; 
            }

            .nav-menu ul {
                gap: 15px;
            }
            .nav-menu a {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="images/main.jpg" alt="Amphile Corporate Background" class="hero-background-img">

        <div class="overlay"></div>

        <header>
            <div class="logo">Amphile</div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#services">服务</a></li>
                    <li><a href="#about">关于我们</a></li>
                    <li><a href="#contact">联系我们</a></li>
                </ul>
            </nav>
        </header>

        <div class="content">
            <div class="divider"></div>
            <h1 class="slogan">以同频，致超幅</h1>
            <p class="description">
                跨越认知的边界。我们在前沿技术与商业变量的交汇处寻找共振的支点，将底层势能转化为破局的力量。
            </p>
        </div>
    </div>

</body>
</html>
