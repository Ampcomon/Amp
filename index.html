<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amphile|以同频致超幅</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            color: #ffffff;
        }

        /* 英雄视差背景区域 */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            /* 背景图片路径：请在同级目录的images文件夹中放入 background.jpg */
            /* 建议：使用表现“两种截然不同的物质（如水与油/蓝与金）交汇融合”的抽象背景图 */
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* 暗色遮罩层：确保文字在任何背景图片下都清晰可见 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 使用渐变遮罩，左侧偏深，右侧渐浅 */
            background: linear-gradient(90deg, rgba(10, 20, 40, 0.85) 0%, rgba(10, 20, 40, 0.4) 100%);
            z-index: 1;
        }

        /* 顶部导航栏 */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 左上角 Logo */
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* 主体内容区 */
        .content {
            position: relative;
            z-index: 2;
            padding: 0 10%;
            max-width: 1200px;
        }

        .slogan {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 20px;
            background: linear-gradient(120deg, #ffffff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .description {
            font-size: 20px;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 40px;
            color: #e0e0e0;
            max-width: 600px;
            letter-spacing: 1px;
        }

        /* 分界线装饰 */
        .divider {
            width: 60px;
            height: 4px;
            background-color: #4facfe;
            margin-bottom: 30px;
            border-radius: 2px;
        }

        /* 响应式设计：适配手机端 */
        @media (max-width: 768px) {
            header {
                padding: 20px;
            }
            .logo {
                font-size: 24px;
            }
            .slogan {
                font-size: 40px;
            }
            .description {
                font-size: 16px;
            }
            .content {
                padding: 0 5%;
            }
        }
    </style>
</head>
